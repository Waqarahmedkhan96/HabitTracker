spring.application.name=habittracker-backend
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/habittracker_db
spring.datasource.username=habittracker_user
spring.datasource.password=habittracker_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

app.jwt.secret=change-this-to-a-long-random-very-secure-secret-key-for-habittracker
app.jwt.expiration-ms=86400000

management.endpoints.web.exposure.include=health,info